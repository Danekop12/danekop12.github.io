<html>
<head>
    <title>GitHub Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        .repo-list {
            list-style-type: none;
            padding: 0;
        }
        .repo-item {
            margin-bottom: 10px;
        }
        .repo-link {
            text-decoration: none;
            color: #0366d6;
        }
        </style>
</head>
<body>
    <h1>GitHub Repositories</h1>
    <ul class="repo-list">
        <li class="repo-item"><a href="https://github.com/user/repo1" class="repo-link">Repo 1</a></li>
        <li class="repo-item"><a href="https://github.com/user/repo2" class="repo-link">Repo 2</a></li>
        <li class="repo-item"><a href="https://github.com/user/repo3" class="repo-link">Repo 3</a></li>
    </ul>
</body>
</html>
